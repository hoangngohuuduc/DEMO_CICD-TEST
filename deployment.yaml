apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo
spec:
  selector:
    matchLabels:
      app: demo
  replicas: 1 
  template: 
    metadata:
      labels:
        app: demo
    spec:
      containers:
      - name: demo
        image: duchoang26/demo:latest
        ports:
        - containerPort: 8080
        imagePullPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: demo
spec:
  type: LoadBalancer
  selector:
    app: demo
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 8080
